<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Details </title>
</head>
<body>
    
<h1>Enter Your Datails Here</h1>
<form action="">

<label for="firstnamee">First Name</label>
<input id="firstnamee" type="text" name="firstnamee">
<label for="secondname">Second Name</label> 
<input id="secondname" type="text" name="secondname">
<br><br>

<label for="age">Age</label>
<input id="age" type="number" name="age">
<br><br>
<label for="dateofbirth">Date Of Birth</label>
<input id="dateofbirth" type="date" name="dateofbirth">
<br><br>

<label for="email">Email</label>
<input id="email" type="email" name="email">
<br><br>
<label for="password">Password</label>
<input id="password" type="password" name="password">

<label for="confirmpassword">Confirm Password</label>
<input id="confirmpassword" type="confirmpassword" name="confirmpassword">
<br><br>

<label for="number">Number</label>
<input id="number" type="number" name="number">
<br><br>

<p>Enter Your TShirt Size</p>

<input id="small" name="tshirt-size" type="radio" value="small"> 
<label for="small">Small</label><br>

<input id="medium" name="tshirt-size" type="radio" value="medium"> 
<label for="medium">Medium</label><br>

<input id="large" name="tshirt-size" type="radio" value="large">
<label for="large">Large</label><br>

<br><br>

<label for="color">Your color</label>
<input id="color" type="color">
<br><br>

<label for="cars">Choose a car:</label>
<select name="cars" id="cars">
    <option value="volvo">Volvo</option>
    <option value="saab">Saab</option>
    <option value="mercedes">Mercedes</option>
    <option value="audi">Audi</option>
</select>

<br><br>


<input type="reset" value="Reset">

<input type="submit" value="Submit">



</form>


</body>
</html>
